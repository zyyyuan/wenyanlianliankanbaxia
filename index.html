function startNewRound(){if(autoTimer){clearTimeout(autoTimer);autoTimer=null}countdownBar.classList.remove('active');var p,c;if(currentLevel==='primary'){p=primaryPool;c=10}else if(currentLevel==='middle'){p=middlePool;c=20}else{p=advancedPool;c=30}currentBank=pickUnused(p,c);currentBank.forEach(function(i){usedIds[i.id]=true});currentIndex=0;correctCount=0;answered=false;quizFinished=false;replayButton.classList.remove('show');replayButton.style.display='none';hintMessageEl.textContent='';updateRemaining();renderQuestion(0)}
function switchLevel(l){currentLevel=l;usedIds={};startNewRound();levelBtns.forEach(function(b){b.classList.remove('active');if(b.dataset.level===l)b.classList.add('active')})}
function renderQuestion(i){if(!currentBank.length||i>=currentBank.length){finishQuiz();return}if(autoTimer){clearTimeout(autoTimer);autoTimer=null}countdownBar.classList.remove('active');var item=currentBank[i];contextSentenceEl.innerHTML=item.sentence;sourceTagEl.textContent='📋 '+item.source;optionsContainer.innerHTML='';var letters=['A','B','C'];item.options.forEach(function(opt,idx){var btn=document.createElement('div');btn.className='option-box';btn.innerHTML='<span class="option-letter">'+letters[idx]+'</span> '+opt;btn.dataset.optionIndex=idx;btn.addEventListener('click',optionHandler);optionsContainer.appendChild(btn)});answered=false;hintMessageEl.textContent='';progressDisplay.textContent='第'+(i+1)+'/'+currentBank.length+'题';document.querySelectorAll('.option-box').forEach(function(b){b.classList.remove('correct-highlight','wrong-highlight')})}
function optionHandler(e){if(answered||quizFinished)return;initAudio();var item=currentBank[currentIndex],optDiv=e.currentTarget,optIdx=parseInt(optDiv.dataset.optionIndex,10);answered=true;var all=document.querySelectorAll('.option-box');all.forEach(function(b){b.classList.remove('correct-highlight','wrong-highlight');b.style.pointerEvents='none'});if(optIdx===item.correct){optDiv.classList.add('correct-highlight');playSound('correct');hintMessageEl.textContent='✓正确！';correctCount++}else{optDiv.classList.add('wrong-highlight');all.forEach(function(b){if(parseInt(b.dataset.optionIndex)===item.correct)b.classList.add('correct-highlight')});playSound('wrong');hintMessageEl.textContent='✗错误，已标绿'}startAutoNext()}
function startAutoNext(){countdownBar.classList.add('active');countdownFill.style.transition='none';countdownFill.style.width='100%';setTimeout(function(){countdownFill.style.transition='width 1.5s linear';countdownFill.style.width='0%'},50);autoTimer=setTimeout(function(){if(currentIndex<currentBank.length-1){currentIndex++;renderQuestion(currentIndex)}else{finishQuiz()}},1500)}
function finishQuiz(){if(autoTimer){clearTimeout(autoTimer);autoTimer=null}countdownBar.classList.remove('active');quizFinished=true;contextSentenceEl.innerHTML='🎉恭喜！已完成本关';sourceTagEl.textContent='';optionsContainer.innerHTML='';progressDisplay.textContent='完成'+currentBank.length+'题|正确'+correctCount+'题';replayButton.classList.add('show');replayButton.style.display='inline-flex';updateRemaining();var n={primary:'初级',middle:'中级',advanced:'高级'};hintMessageEl.textContent='得分:'+correctCount+'/'+currentBank.length+'|再来一关继续'+n[currentLevel]+'练习'}
replayButton.addEventListener('click',function(){startNewRound();window.scrollTo({top:0,behavior:'smooth'})});
levelBtns.forEach(function(b){b.addEventListener('click',function(e){var l=e.target.dataset.level;if(l&&l!==currentLevel)switchLevel(l)})});
document.body.addEventListener('click',function once(){initAudio()},{once:true});
switchLevel('primary');
})();
</script>
</body>
</html>
